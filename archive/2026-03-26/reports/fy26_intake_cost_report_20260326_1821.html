unity and support business before Retail/Ecom callout the issue.", "scope_short": "Requestor: Jessie SUN\nRequestor's Line Manager: Vicki Chung\nWhy we need this new...", "linked_issues": [{"key": "CNTD-5401", "type": "Related to"}]}, {"key": "CNTIN-607", "summary": "RITM1688323 - guest segmentation related enhancement", "created": "2025-11-12", "pillars": ["ChinaMarketing"], "pillar_str": "ChinaMarketing", "intake_type": "New Dev", "sla_days": 133, "sla_class": "sla-danger", "done_date": "", "status": "Done", "status_cat": "Done", "assignee": "Amanda Xu", "cost_rmb_raw": 1259225.19, "cost_usd_raw": 169995.40065, "rmb_str": "¥1,259,225", "usd_str": "$169,995.40", "approver": "Mel Chau", "scope": "Build reliable data foundation and automated guest segmentation calculation mechanism Provide product attributes (collection, special edition, etc) and transaction tagging (FP/MD/Discount)Implement guest tagging logic into GTC (Guest tagging center) - based on the script by agencyLanding guest tagging to Data Lake for future reporting and communication", "scope_short": "Build reliable data foundation and automated guest segmentation calculation mech...", "linked_issues": [{"key": "CNTIN-736", "type": "Related to"}]}, {"key": "CNTIN-593", "summary": "RITM1686664 - NPS response improvement", "created": "2025-11-09", "pillars": ["ChinaRetail"], "pillar_str": "ChinaRetail", "intake_type": "TBD", "sla_days": 136, "sla_class": "sla-danger", "done_date": "", "status": "Discovery", "status_cat": "In Progress", "assignee": "Briddy Yang", "cost_rmb_raw": 150000.0, "cost_usd_raw": 20250.0, "rmb_str": "¥150,000", "usd_str": "$20,250.00", "approver": "-", "scope": "Requestor: Tony Zhu\nRequestor's Line Manager: Franck Feng\nWhy we need this new case?: In order to enhance the NPS survey open rate and response rate. We need to optimize these 2 points as below: \n1: Introduce additional and more customer-relevant touch-points (notifications from WeChat) to improve the survey open rate.\n2: Optimize and shorten the questionnaire to reduce the current average completion time of 7 minutes 20 seconds, thereby driving a higher response rate.\nWhat new process/user experience will be needed in this case?: Use new touch-points which may easy for guests to access to the post purchase survey.\nPush out the new questionnaire, reduce customer completion time, and ask more targeted questions addressing core retail issues.\nHow to define the success of this case?: NPS response rate achieve 1.5% - 2.0%.", "scope_short": "Requestor: Tony Zhu\nRequestor's Line Manager: Franck Feng\nWhy we need this new c...", "linked_issues": []}, {"key": "CNTIN-591", "summary": "RITM1683834 - Buyers' assortment review requirement", "created": "2025-11-09", "pillars": ["ChinaMP&A"], "pillar_str": "ChinaMP&A", "intake_type": "New Dev", "sla_days": 136, "sla_class": "sla-danger", "done_date": "", "status": "Done", "status_cat": "Done", "assignee": "Min Hong", "cost_rmb_raw": 49104.0, "cost_usd_raw": 6629.040000000001, "rmb_str": "¥49,104", "usd_str": "$6,629.04", "approver": "Helen Wang", "scope": "To support the demand for multi-dimensional assortment reviews, User would like to make enhancements below on the output PowerPoint of existing Product E2P process", "scope_short": "To support the demand for multi-dimensional assortment reviews, User would like ...", "linked_issues": [{"key": "CSCOP-862", "type": "Issue is related to "}, {"key": "CNTIN-854", "type": "Related to"}]}, {"key": "CNTIN-579", "summary": "RITM1675817 - Customs Portal Inter Company Transfer", "created": "2025-11-03", "pillars": ["ChinaFulfillment"], "pillar_str": "ChinaFulfillment", "intake_type": "TBD", "sla_days": 142, "sla_class": "sla-danger", "done_date": "", "status": "Discovery", "status_cat": "In Progress", "assignee": "Aki Zhu", "cost_rmb_raw": 0, "cost_usd_raw": 0, "rmb_str": "¥0", "usd_str": "$0", "approver": "-", "scope": "Requestor: Desree Chen\nRequestor's Line Manager: Kenneth Rao\nWhy we need this new case?: Customs Portal – Inter Company Transfer Management (Non – direct PO) DiscoverySupport Business Expansion: Prepare the portal to seamlessly onboard the new DC (3rd DC) in the upcoming year, including new ports and brokers, without impact existing operations.Gain E2E Supply Chain Visibility: Incorporate Non-Direct PO flows to have a complete picture of all internal and cross-border goods movements.Enhance Data Intelligence: Help enrich the EPC Code to establish critical linkages between a product's identity (PO), its origin (COO), and its commercial attributes (Season).\nWhat new process/user experience will be needed in this case?: This discovery initiative is essential to prepare our customs management framework for upcoming business complexity in our supply chain data. We need to:Configuration & Onboarding Workflow: A streamlined process in the portal's backend to configure new DCs, ports, and brokers.Non-Direct PO Management: Understand the complete flow and associated data readiness of Non-Direct PO (DC-to-DC transfers), which are currently invisible in our current monitoring scope.Data Enrichment & Mapping: Investigate non-direct PO data and its potential usage of how to facilitate the RFID project team to enrich our product EPC Code with origin (COO) and commercial attributes (Season) to empower advanced customs analytics.\nHow to define the success of this case?: • A Future-State Design Document detailing the recommended process and data model for incorporating new DCs and tracking non-direct POs in the Customs Portal.A Prioritized Roadmap identifying high-value scenarios for Non-Direct PO.", "scope_short": "Requestor: Desree Chen\nRequestor's Line Manager: Kenneth Rao\nWhy we need this ne...", "linked_issues": [{"key": "CSCOP-861", "type": "Issue is related to "}]}, {"key": "CNTIN-577", "summary": "RITM1675811 - Customs Portal AEO enhancement", "created": "2025-11-03", "pillars": ["ChinaFulfillment"], "pillar_str": "ChinaFulfillment", "intake_type": "TBD", "sla_days": 142, "sla_class": "sla-danger", "done_date": "", "status": "Discovery", "status_cat": "In Progress", "assignee": "Aki Zhu", "cost_rmb_raw": 0, "cost_usd_raw": 0, "rmb_str": "¥0", "usd_str": "$0", "approver": "-", "scope": "Requestor: Desree Chen\nRequestor's Line Manager: Kenneth Rao\nWhy we need this new case?: New Entry Verification features can directly address core AEO standards by transforming our customs management from passive to proactive, ensuring continuous compliance, and providing the auditable data trail required by authorities. \nAnd as we observe increasing volumes of declarations of amendments, bond transactions, and more complex cases, our current system requires upgrades to maintain data integrity and operational control procedures. The proposed improvements will directly respond to these growing needs while aligning with AEO compliance standards and providing the auditable data trail required by authorities.Enforce Compliance & Ensure Data Integrity: Automatically verify HS code consistency and document accuracy to prevent costly classification errors and customs penalties.Improve Broker Accountability & Performance: Monitor broker performance (document upload timeliness, lead time adherence) to drive efficiency and service level improvements.Enhance Financial Control & Visibility: Gain real-time insights into duty payments, potential over/under-valuation, and custom bond flow to monitor tax costs.Mitigate Operational Risks: Centralize monitoring of activities like amendment/rejection of declarations.\nWhat new process/user experience will be needed in this case?: 1. Centralized Verification & Monitoring Center and Structured Alert Process Users will have font-end view to all the below critical data and alerts in Entry Verification Module.Document Upload Timeliness Alert (Monitoring the timeliness of document uploads and archiving by various brokers)Duty Summary (Tracking and monitoring the company's customs duty, VAT payments, and exemption status)Declaration Status Check (Monitoring the customs clearance status of POs to identify declarations exceeding lead time)HS Verification by SO (Checking if the same Style used different HS codes for declaration in the past year)HS Verification by Declaration (Verifying whether the HS codes used for Styles in the same batch match the company's HS Master File)Document Verification (Checking if the documents uploaded by brokers meet requirements)Adding lead time monitoring to the Milestone page, requiring remarks for cases with excessively long lead times, provides overdue custom clearance alert.Pricing Alert: Flagging and alerting cases of overvalued or undervalued declared goods.Document Verification: Allowing brokers to leave remarks for special operations when incorrect documents are uploaded, followed by approval from the Trade Ops Team to pass the error.Enhanced Data Integration Views: New module will be dedicated to displaying integrated customs data, such as declaration amendments and the customs bond transactions.Centralized display and monitoring of amendment/cancellation information (frequent modifications may impact the company's customs credibility)Display and monitoring of bond information (Tracking the volume of declarations cleared using bonds and the status of bond refunds)\nHow to define the success of this case?: Success will be measured by the optimization of the Trade Ops team's workflow:From searching for issues to acting on exceptions. The team spends less time on manual data gathering and more time resolving system-prioritized alerts.From managing all transactions to focusing on high-risk cases. Effort is concentrated on critical issues like HS code mismatches, pricing errors, and delayed declarations, instead of low-value checks.From subjective feedback to data-driven broker management. Performance reviews with brokers are based on clear metrics from system reports (e.g., upload timeliness, lead time adherence).", "scope_short": "Requestor: Desree Chen\nRequestor's Line Manager: Kenneth Rao\nWhy we need this ne...", "linked_issues": [{"key": "CSCOP-860", "type": "Issue is related to "}]}, {"key": "CNTIN-571", "summary": "RITM1671612 - Business Database", "created": "2025-11-02", "pillars": ["ChinaMP&A"], "pillar_str": "ChinaMP&A", "intake_type": "TBD", "sla_days": 143, "sla_class": "sla-danger", "done_date": "", "status": "Discovery", "status_cat": "In Progress", "assignee": "Min Hong", "cost_rmb_raw": 0, "cost_usd_raw": 0, "rmb_str": "¥0", "usd_str": "$0", "approver": "-", "scope": "Requestor: Sophie Hong\nRequestor's Line Manager: Odette Yip\nWhy we need this new case?: To standardize one source of truth for business reads\nWhat new process/user experience will be needed in this case?: A database creation to allow reporting automations and customized reporting needs\nHow to define the success of this case?: Database setup completion by 2026 Feb with good running efficiencies and completeness.", "scope_short": "Requestor: Sophie Hong\nRequestor's Line Manager: Odette Yip\nWhy we need this new...", "linked_issues": [{"key": "CSCOP-851", "type": "Issue is related to "}]}, {"key": "CNTIN-565", "summary": "RITM1667895 - Wecom Evolution Tools", "created": "2025-10-29", "pillars": ["ChinaMarketing"], "pillar_str": "ChinaMarketing", "intake_type": "New Application", "sla_days": 147, "sla_class": "sla-danger", "done_date": "", "status": "Done", "status_cat": "Done", "assignee": "Amanda Xu", "cost_rmb_raw": 1710000.0, "cost_usd_raw": 230850.00000000003, "rmb_str": "¥1,710,000", "usd_str": "$230,850.00", "approver": "Mel Chau", "scope": "Elevate the existing tools (企微智能助手& 企微商城)to enhance Guest Engagement and omni-channel experience capabilities while equipping store teams with an all-in-one, user-friendly intelligent solution that is effective and improves operational efficiency.", "scope_short": "Elevate the existing tools (企微智能助手& 企微商城)to enhance Guest Engagement and omni-ch...", "linked_issu sitive data (e.g. ID, address) stored on global database​Stop transferring future China Ambassador contracts to global databaseEmployee data transfer with external benefits vendors via email\nAs-is: China H&W team sends reports containing sensitive employee data to Ping An (commercial insurance vendor), FESCO (outsourced EAP vendor), Mercer (health check vendor) and Cigna through email attachments on a recurring monthly basis.\nTo-be: Develop safe and secure outbound data transfer solution from Workday to listed vendorsTransition from Excel OTH Tracker to Avature​\nAs-is: China TA is relying on an Excel spreadsheet to track open SSC positions (OTH) and Retail NSO (new store opening) , which requires manual updates and data reconciliation against source systems. There's also no proper access management.\nTo-be: Sunset the Excel based tracker and transition position management to Avature CNLack of standardized process and governance for external data transferring\nAs-is: There's currently little or no governance to ensure compliance with the new CBDT policies. All out-of-China data transfers must undergo review and approval by China Legal, Cybersecurity, PDG, and other relevant stakeholders. This process also ensures monitoring of annual data transfer volumes to avoid exceeding the 100k threshold.\nTo-be: Establish a robust governance and process to review and monitor out-of-China data transfer requests\nHow to define the success of this case?: The goal of the project is to ensure reliable and secure access to people data in the China market by implementing processes that align with the lululemon’s internal People Data Governance policies, comply with cross-border data transfer (CBDT) regulations, and incorporate market-specific nuances within our global framework\nSupplementary information (if have): Detailed discovery documentation:", "scope_short": "Requestor: Gary Li\nRequestor's Line Manager: Shahar Gur\nWhy we need this new cas...", "linked_issues": [{"key": "CS esponse times. These analytics capabilities exist in APs current surveillance backend, however as separate modules which incur high additional fees. Limited Searchability: Reviewing historical footage is time-consuming, requiring manual scrubbing through hours of video.False Alarms: Motion-based triggers generate unnecessary alerts, wasting resources. TO-BE Process:Automated Detection: AI analyzes live feeds in real-time, flagging anomalies (suspicious behavior, unattended objects, crowd gatherings).Proactive Alerts: Instant notifications are sent for predefined threats, enabling faster intervention.Intelligent Search: Users can query footage by attributes instead of manual review.Reduced False Positives: AI filters out irrelevant motion using behavioral context. Eliminate redundancies of outdated and expensive BA systems offering instant ROI.\nHow to define the success of this case?: 1. Financial Impact: Reduction of redundancies and unnecessary costs, drive business metrics with access to informative and insightful information. Strategic Benefits: risk reduction, increased compliance, scalability, utilization of existing data, centralization and integrations with existing systems. AI analytics should save hundreds of thousands annually and improve security response times significantly. Target to see ROI within 1.5 years.", "scope_short": "Requestor: Jack Fernyhough\nRequestor Email: jfernyhough@lululemon.com\nRequestor'...", "linked_issues": [{"key": "CNTIN-422", "type": "Related to"}]}, {"key": "CNTIN-325", "summary": "Smart Subsidy Flow", "created": "2025-06-22", "pillars": ["ChinaRetail"], "pillar_str": "ChinaRetail", "intake_type": "TBD", "sla_days": 276, "sla_class": "sla-danger", "done_date": "", "status": "Discovery", "status_cat": "In Progress", "assignee": "Jony Li", "cost_rmb_raw": 0, "cost_usd_raw": 0, "rmb_str": "¥0", "usd_str": "$0", "approver": "-", "scope": "**2025.7 Updated: **Assign to@Meave Qian from Retail Team: Wait for SC review.**2025.6 Ticke function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (i18n[lang][key]) {
      el.textContent = i18n[lang][key];
    }
  });
}

function formatCost(rmb, rate) {
  const usd = rmb * rate;
  const rmbStr = '¥' + rmb.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  const usdStr = '$' + usd.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  return rmbStr + '<br>' + usdStr;
}

function updateExchangeRate() {
  exchangeRate = parseFloat(document.getElementById('exchangeRate').value) || 0.135;
  renderTable();
}

function getStatusClass(status) {
  if (['New'].includes(status)) return 'status-todo';
  if (['Discovery', 'Strategy', 'Execution'].includes(status)) return 'status-progress';
  if (['Done'].includes(status)) return 'status-done';
  return 'status-cancel';
}

function getSLAClass(days, status) {
  if (['Done', 'Closed', 'Resolved'].includes(status)) return 'sla-done';
  if (days > 14) return 'sla-danger';
  if (days > 7) return 'sla-warning';
  return '';
}

function toggleRow(key) {
  const row = document.querySelector(`[data-key="${key}"]`);
  row.classList.toggle('expanded');
  const details = document.getElementById(`details-${key}`);
  if (details) details.classList.toggle('show');
}

function togglePillar(pillar) {
  const idx = activeFilters.pillars.indexOf(pillar);
  if (idx > -1) {
    activeFilters.pillars.splice(idx, 1);
  } else {
    activeFilters.pillars.push(pillar);
  }
  renderPillarFilter();
  applyFilters();
}

function filterByStatus(status) {
  activeFilters.status = status;
  currentPage = 1;
  document.querySelectorAll('.stat-card').forEach(card => card.classList.remove('active'));
  event.currentTarget.classList.add('active');
  
  // Clear dropdown to avoid conflict
  document.getElementById('filterStatus').value = '';
  
  renderTable();
  updateCharts();
}

  if (statusFilter) {
    activeFilters.status = statusFilter;
    document.querySelectorAll('.stat-card').forEach(card => card.classList.remove('active'));
  }
  
  currentPage = 1; // Reset to first page
  renderTable();
  updateCharts();
}

function clearFilters() {
  activeFilters = { status: 'all', pillars: [], search: '' };
  document.getElementById('searchTicket').value = '';
  document.getElementById('filterStatus').value = '';
  document.querySelectorAll('.stat-card').forEach(card => card.classList.remove('active'));
  renderPillarFilter();
  renderTable();
  updateCharts();
}

function renderPillarFilter() {
  const container = document.getElementById('pillarFilter');
  container.innerHTML = allPillars.map(p => `
    <span class="pillar-tag ${activeFilters.pillars.includes(p) ? 'active' : ''}" onclick="togglePillar('${p}')">${p}</span>
  `).join('');
}

function renderTable() {
  const container = document.getElementById('tableBody');
  
  let filtered = rowsData.filter(row => {
    // Search filter
    if (activeFilters.search && !row.key.toLowerCase().includes(activeFilters.search) && 
        !row.summary.toLowerCase().includes(activeFilters.search)) return false;
    
    // Status filter
    if (activeFilters.status && activeFilters.status !== 'all') {
      const statusMapping = {
        'not_started': ['New'],
        'in_progress': ['Discovery', 'Strategy', 'Execution'],
        'closed': ['Done'],
        'cancelled': ['Cancelled']
      };
      
      let statusList;
      if (statusMapping[activeFilters.status]) {
        statusList = statusMapping[activeFilters.status];
      } else {
        statusList = activeFilters.status.split(',');
      }
      
      if (!statusList.includes(row.status)) return false;
    }
    
    // Pillar filter
    if (activeFilters.pillars.length > 0) {
      const hasPillar = row.pillars.some(p => activeFilters.pillars.includes(p));
      if (!hasPillar) return false;
    }
    
    return true;
  });
  
  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="no-results">
        <div class="no-results-icon">🔍</div>
        <div>${i18n[currentLang].noResults}</div>
      </div>
    `;
    return;
  }
  
  container.innerHTML = filtered.map(row => {
    const costDisplay = formatCost(row.cost_rmb_raw, exchangeRate);
    const statusClass = getStatusClass(row.status);
    const slaClass = getSLAClass(row.sla_days, row.status);
    const slaText = row.sla_days + 'd';
    
    const followUpLinks = row.linked_issues.map(li => 
      `<a href="https://lululemon.atlassian.net/browse/${li.key}" class="followup-link" target="_blank">${li.key}</a>`
    ).join('') || '-';
    
    return `
      <div class="table-row" data-key="${row.key}" onclick="toggleRow('${row.key}')">
        <div class="col-expand"></div>
        <div class="col-intake">
          <a href="https://lululemon.atlassian.net/browse/${row.key}" class="ticket-key" target="_blank" onclick="event.stopPropagation()">${row.key}</a>
          <span class="ticket-summary">${row.summary}</span>
          <span class="ticket-date">${row.created}</span>
        </div>
        <div class="col-pillar">${row.pillar_str}</div>
        <div class="col-type ${row.intake_type === 'TBD' ? 'tbd' : ''}">${row.intake_type}</div>
        <div class="col-sla ${slaClass}">${slaText}</div>
        <div class="col-status"><span class="status-badge ${statusClass}">${row.status}</span></div>
        <div class="col-assignee">${row.assignee}</div>
        <div class="col-cost" data-rmb="${row.cost_rmb_raw}">${costDisplay}</div>
        <div class="col-approver">${row.approver}</div>
        <div class="col-scope" title="Click to expand">${row.scope_short}</div>
      </div>
      <div class="row-details" id="details-${row.key}">
        <div class="detail-section">
          <div class="detail-label">Scope (Full):</div>
          <div class="detail-content">${row.scope}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">Follow up:</div>
          <div class="detail-content">${followUpLinks}</div>
        </div>
      </div>
    `;
  }).join('');
}

function updateCharts() {
  // Status donut chart
  const statusCounts = {};
  rowsData.forEach(row => {
    if (!statusCounts[row.status]) statusCounts[row.status] = 0;
    statusCounts[row.status]++;
  });
  
  // Pillar bar chart
  const pillarCounts = {};
  rowsData.forEach(row => {
    row.pillars.forEach(p => {
      pillarCounts[p] = (pillarCounts[p] || 0) + 1;
    });
  });
  
  // Render charts (simplified)
  const colors = ['#5470c6', '#91cc75', '#fac858', '#ee6666', '#73c0de', '#3ba272', '#fc8452'];
  
  // Status legend
  const statusLegend = document.getElementById('statusLegend');
  statusLegend.innerHTML = Object.entries(statusCounts).map(([status, count], i) => `
    <span class="legend-item"><span class="legend-dot" style="background:${colors[i % 7]}"></span>${status} ${count}</span>
  `).join('');
  
  // Pillar bar chart
  const pillarChart = document.getElementById('pillarChart');
  const maxCount = Math.max(...Object.values(pillarCounts));
  pillarChart.innerHTML = Object.entries(pillarCounts).map(([pillar, count], i) => `
    <div class="bar-item" onclick="togglePillar('${pillar}')">
      <div class="bar-label">${pillar}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${(count/maxCount*100)}%;background:${colors[i % 7]}"></div>
        <span class="bar-value">${count}</span>
      </div>
    </div>
  `).join('');
}

// Init
renderPillarFilter();
renderTable();
updateCharts();
</script>
</body>
</html>
