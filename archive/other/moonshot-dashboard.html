<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonshot Token 用量监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .card-title {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .balance-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        .balance-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 20px;
            color: white;
        }
        .balance-label {
            font-size: 0.875rem;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        .balance-value {
            font-size: 2rem;
            font-weight: bold;
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .status-ok {
            background: #d4edda;
            color: #155724;
        }
        .status-warning {
            background: #fff3cd;
            color: #856404;
        }
        .status-danger {
            background: #f8d7da;
            color: #721c24;
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
        }
        .history-table th,
        .history-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .history-table th {
            color: #666;
            font-weight: 600;
            font-size: 0.875rem;
        }
        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        .refresh-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .loading {
            text-align: center;
            color: #666;
            padding: 40px;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 16px;
            border-radius: 8px;
            margin: 16px 0;
        }
        .last-update {
            text-align: center;
            color: rgba(255,255,255,0.8);
            margin-top: 20px;
            font-size: 0.875rem;
        }
        .progress-bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌙 Moonshot Token 用量监控</h1>
        
        <div class="card">
            <div class="card-title">
                <span>💰</span>
                <span>当前余额</span>
            </div>
            <div id="balance-content">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">
                <span>📊</span>
                <span>使用统计</span>
            </div>
            <div id="stats-content">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">
                <span>📝</span>
                <span>历史记录</span>
            </div>
            <div id="history-content">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div style="text-align: center; margin-top: 24px;">
            <button class="refresh-btn" onclick="refreshData()" id="refreshBtn">
                🔄 刷新数据
            </button>
        </div>

        <p class="last-update">最后更新: <span id="lastUpdate">--</span></p>
    </div>

    <script>
        // 从本地存储读取历史数据
        function getHistory() {
            const history = localStorage.getItem('moonshot_history');
            return history ? JSON.parse(history) : [];
        }

        // 保存历史数据
        function saveHistory(data) {
            const history = getHistory();
            history.unshift({
                time: new Date().toISOString(),
                balance: data
            });
            // 只保留最近50条
            if (history.length > 50) {
                history.pop();
            }
            localStorage.setItem('moonshot_history', JSON.stringify(history));
        }

        // 格式化数字
        function formatNumber(num) {
            return num.toLocaleString('zh-CN');
        }

        // 格式化时间
        function formatTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN');
        }

        // 获取余额
        async function fetchBalance() {
            // 注意：这里需要用户填入自己的 API Key
            const API_KEY = localStorage.getItem('moonshot_api_key') || '';
            
            if (!API_KEY) {
                throw new Error('请先设置 Moonshot API Key');
            }

            try {
                const response = await fetch('https://api.moonshot.cn/v1/users/me/balance', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                return data;
            } catch (error) {
                throw new Error(`查询失败: ${error.message}`);
            }
        }

        // 渲染余额
        function renderBalance(data) {
            const container = document.getElementById('balance-content');
            
            if (!data || !data.data) {
                container.innerHTML = '<div class="error">无法获取余额数据</div>';
                return;
            }

            const balance = data.data;
            const total = balance.total_balance || 0;
            const granted = balance.granted_balance || 0;
            const toppedUp = balance.topped_up_balance || 0;
            
            // 计算使用比例
            const usedRatio = total > 0 ? ((total - (balance.available_balance || 0)) / total * 100) : 0;
            
            let statusClass = 'status-ok';
            let statusText = '余额充足';
            
            if (usedRatio > 90) {
                statusClass = 'status-danger';
                statusText = '⚠️ 余额不足';
            } else if (usedRatio > 70) {
                statusClass = 'status-warning';
                statusText = '⚡ 注意使用';
            }

            container.innerHTML = `
                <div class="balance-grid">
                    <div class="balance-item">
                        <div class="balance-label">可用余额 (Tokens)</div>
                        <div class="balance-value">${formatNumber(balance.available_balance || 0)}</div>
                        <div style="margin-top: 8px;">
                            <span class="status ${statusClass}">${statusText}</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${Math.min(usedRatio, 100)}%"></div>
                        </div>
                        <div style="font-size: 0.75rem; margin-top: 4px; opacity: 0.8;">
                            已使用 ${usedRatio.toFixed(1)}%
                        </div>
                    </div>
                    <div class="balance-item">
                        <div class="balance-label">总余额 (Tokens)</div>
                        <div class="balance-value">${formatNumber(total)}</div>
                    </div>
                </div>
                <div style="margin-top: 16px; font-size: 0.875rem; color: #666;">
                    <p>📌 赠送余额: ${formatNumber(granted)} tokens</p>
                    <p>💳 充值余额: ${formatNumber(toppedUp)} tokens</p>
                </div>
            `;
        }

        // 渲染统计
        function renderStats() {
            const container = document.getElementById('stats-content');
            const history = getHistory();
            
            if (history.length < 2) {
                container.innerHTML = '<p style="color: #666;">数据不足，需要至少两次查询才能计算统计</p>';
                return;
            }

            const latest = history[0].balance.data;
            const oldest = history[history.length - 1].balance.data;
            
            const availableNow = latest.available_balance || 0;
            const availableThen = oldest.available_balance || 0;
            const used = availableThen - availableNow;
            
            // 计算时间差（小时）
            const timeDiff = (new Date(history[0].time) - new Date(history[history.length - 1].time)) / (1000 * 60 * 60);
            const hourlyRate = timeDiff > 0 ? (used / timeDiff).toFixed(2) : 0;

            // 预测可用时间
            const hoursRemaining = hourlyRate > 0 ? (availableNow / hourlyRate).toFixed(1) : '∞';

            container.innerHTML = `
                <div class="balance-grid">
                    <div class="balance-item">
                        <div class="balance-label">期间消耗</div>
                        <div class="balance-value">${formatNumber(used)}</div>
                        <div style="font-size: 0.875rem; opacity: 0.9; margin-top: 4px;">
                            共 ${history.length} 次查询
                        </div>
                    </div>
                    <div class="balance-item">
                        <div class="balance-label">平均消耗速率</div>
                        <div class="balance-value">${hourlyRate}</div>
                        <div style="font-size: 0.875rem; opacity: 0.9; margin-top: 4px;">
                            tokens/小时
                        </div>
                    </div>
                    <div class="balance-item">
                        <div class="balance-label">预估剩余时间</div>
                        <div class="balance-value">${hoursRemaining}</div>
                        <div style="font-size: 0.875rem; opacity: 0.9; margin-top: 4px;">
                            小时 (按当前速率)
                        </div>
                    </div>
                </div>
            `;
        }

        // 渲染历史记录
        function renderHistory() {
            const container = document.getElementById('history-content');
            const history = getHistory();
            
            if (history.length === 0) {
                container.innerHTML = '<p style="color: #666;">暂无历史记录</p>';
                return;
            }

            const rows = history.slice(0, 10).map((item, index) => {
                const balance = item.balance.data;
                const prevBalance = index < history.length - 1 ? history[index + 1].balance.data : null;
                const used = prevBalance ? (prevBalance.available_balance - balance.available_balance) : 0;
                
                return `
                    <tr>
                        <td>${formatTime(item.time)}</td>
                        <td>${formatNumber(balance.available_balance || 0)}</td>
                        <td>${used > 0 ? '+' + formatNumber(used) : formatNumber(used)}</td>
                        <td>${formatNumber(balance.total_balance || 0)}</td>
                    </tr>
                `;
            }).join('');

            container.innerHTML = `
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>可用余额</th>
                            <th>变化</th>
                            <th>总余额</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows}
                    </tbody>
                </table>
            `;
        }

        // 刷新数据
        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 查询中...';

            try {
                const data = await fetchBalance();
                saveHistory(data);
                renderBalance(data);
                renderStats();
                renderHistory();
                document.getElementById('lastUpdate').textContent = formatTime(new Date().toISOString());
            } catch (error) {
                document.getElementById('balance-content').innerHTML = `<div class="error">${error.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = '🔄 刷新数据';
            }
        }

        // 页面加载时检查 API Key
        window.onload = function() {
            const apiKey = localStorage.getItem('moonshot_api_key');
            if (!apiKey) {
                const key = prompt('请输入你的 Moonshot API Key:');
                if (key) {
                    localStorage.setItem('moonshot_api_key', key);
                    refreshData();
                } else {
                    document.getElementById('balance-content').innerHTML = 
                        '<div class="error">需要 API Key 才能查询余额。请刷新页面并输入 API Key。</div>';
                }
            } else {
                refreshData();
            }
        };
    </script>
</body>
</html>
