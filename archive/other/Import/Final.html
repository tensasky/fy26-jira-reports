    <!-- 引入 Chart.js 数据标签插件 -->

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', 'Microsoft YaHei', sans-serif; background-color: #f8fafc; }
        .sla-critical { color: #ef4444; font-weight: 700; background: #fee2e2; padding: 2px 8px; border-radius: 4px; }
        .sla-warning { color: #f59e0b; font-weight: 700; background: #fef3c7; padding: 2px 8px; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .chart-container { height: 260px; position: relative; }
        #chartSection { transition: max-height 0.3s ease-out; overflow: hidden; }
        #chartSection.collapsed { max-height: 0; }
        #chartSection.expanded { max-height: 600px; }
        
        .kpi-card { transition: all 0.2s ease; cursor: pointer; border: 2px solid transparent; }
        .kpi-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .kpi-card.active { border-color: rgb(59 130 246 / 0.5); background-color: rgb(248 250 252); }
    </style>
</head>

            <button onclick="filterDept('Marketing')" class="dept-btn px-6 py-2 rounded-lg text-sm font-semibold transition-all text-slate-600 hover:bg-slate-50" data-dept="Marketing">Marketing</button>
            <button onclick="filterDept('Retail')" class="dept-btn px-6 py-2 rounded-lg text-sm font-semibold transition-all text-slate-600 hover:bg-slate-50" data-dept="Retail">Retail</button>
            <button onclick="filterDept('SCM')" class="dept-btn px-6 py-2 rounded-lg text-sm font-semibold transition-all text-slate-600 hover:bg-slate-50" data-dept="SCM">SCM</button>
            <button onclick="filterDept('MP&A')" class="dept-btn px-6 py-2 rounded-lg text-sm font-semibold transition-all text-slate-600 hover:bg-slate-50" data-dept="MP&A">MP&A</button>
            <button onclick="filterDept('Corporate')" class="dept-btn px-6 py-2 rounded-lg text-sm font-semibold transition-all text-slate-600 hover:bg-slate-50" data-dept="Corporate">Corporate</button>

                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">费用</th>

                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">具体内容 (Scope)</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase text-center">关联项</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-50 text-sm"></tbody>
                    <tfoot>
                        <tr class="bg-slate-50 font-bold">
                            <td colspan="4" class="px-6 py-4 text-right text-slate-600">Summary (总计已结项费用):</td>
                            <td colspan="4" class="px-6 py-4 text-blue-600" id="totalCostDisplay">¥ 0.00</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>

            { id: "INT-25109", dept: "Marketing", user: "李四", type: "配置任务", created: "2026-02-15", pending: 19, status: "closed", cost: 4800, approver: "Manager B", scope: "情人节落地页配置", link: "BRD-809" },
            { id: "INT-25110", dept: "Tech", user: "王五", type: "项目任务", created: "2026-02-20", pending: 14, status: "closed", cost: 55000, approver: "Director C", scope: "私有云服务器迁移", link: "BRD-810" }
        ];

        let currentDept = 'All';
        let currentStatus = 'all'; 
        let statusChart = null;
        let typeChart = null;

        function init() {
            const today = new Date();
            const dayOfWeek = today.getDay(); 
            const diffToMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1; 
            const lastMonday = new Date(today);
            lastMonday.setDate(today.getDate() - diffToMonday - 7);
            
            document.getElementById('dateFrom').valueAsDate = lastMonday;
            document.getElementById('dateEnd').valueAsDate = today;
            
            updateTotalCounters();
            renderTable();
        }

        function toggleCharts() {
            const section = document.getElementById('chartSection');
            const icon = document.getElementById('toggleIcon');
            if (section.classList.contains('expanded')) {
                section.classList.replace('expanded', 'collapsed');
                icon.classList.add('rotate-180');
            } else {
                section.classList.replace('collapsed', 'expanded');
                icon.classList.remove('rotate-180');
            }
        }

        function updateTotalCounters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const dateFromInput = document.getElementById('dateFrom').value;
            const dateEndInput = document.getElementById('dateEnd').value;
            
            const dateFrom = dateFromInput ? new Date(dateFromInput) : new Date(0);
            const dateEnd = dateEndInput ? new Date(dateEndInput) : new Date();

            const filteredBySearchAndDate = rawData.filter(item => {
                const itemDate = new Date(item.created);
                const matchDept = currentDept === 'All' || item.dept === currentDept;
                const matchSearch = item.id.toLowerCase().includes(search) || item.user.toLowerCase().includes(search) || item.scope.toLowerCase().includes(search);
                const matchDate = itemDate >= dateFrom && itemDate <= dateEnd;
                return matchDept && matchSearch && matchDate;
            });

            document.getElementById('totalCount').innerText = filteredBySearchAndDate.length;
            document.getElementById('openCount').innerText = filteredBySearchAndDate.filter(i => i.status === 'open').length;
            document.getElementById('progressCount').innerText = filteredBySearchAndDate.filter(i => i.status === 'inprogress').length;
            document.getElementById('closedCount').innerText = filteredBySearchAndDate.filter(i => i.status === 'closed').length;
            document.getElementById('cancelledCount').innerText = filteredBySearchAndDate.filter(i => i.status === 'cancelled').length;
        }

        function filterDept(dept) {
            currentDept = dept;
            document.querySelectorAll('.dept-btn').forEach(btn => {
                if (btn.dataset.dept === dept) {
                    btn.classList.add('bg-blue-600', 'text-white');
                    btn.classList.remove('text-slate-600', 'hover:bg-slate-50');
                } else {
                    btn.classList.remove('bg-blue-600', 'text-white');
                    btn.classList.add('text-slate-600', 'hover:bg-slate-50');
                }
            });
            updateTotalCounters();
            renderTable();
        }

        function filterStatus(status) {
            currentStatus = status.toLowerCase();
            document.querySelectorAll('.kpi-card').forEach(card => card.classList.remove('active'));
            const activeCard = document.getElementById(`kpi-${currentStatus}`);
            if (activeCard) activeCard.classList.add('active');
            renderTable();
        }

        function getStatusBadge(status) {
            const map = {
                open: '<span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-[10px] font-bold">OPEN</span>',
                inprogress: '<span class="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-[10px] font-bold">IN PROGRESS</span>',
                closed: '<span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-[10px] font-bold">CLOSED</span>',
                cancelled: '<span class="bg-slate-100 text-slate-700 px-3 py-1 rounded-full text-[10px] font-bold">CANCELLED</span>'
            };
            return map[status] || status;
        }

        function updateCharts(filteredData) {
            const statusCounts = { open: 0, inprogress: 0, closed: 0, cancelled: 0 };
            const typeCounts = {};
            let total = filteredData.length;

            filteredData.forEach(item => {
                statusCounts[item.status]++;
                typeCounts[item.type] = (typeCounts[item.type] || 0) + 1;
            });

            // 状态占比图 (饼图)
            if (statusChart) statusChart.destroy();
            const statusCtx = document.getElementById('statusChart').getContext('2d');
            statusChart = new Chart(statusCtx, {
                type: 'pie',
                data: {
                    labels: ['未开始', '进行中', '已关闭', '已取消'],
                    datasets: [{
                        data: [statusCounts.open, statusCounts.inprogress, statusCounts.closed, statusCounts.cancelled],
                        backgroundColor: ['#60a5fa', '#fbbf24', '#34d399', '#94a3b8'],
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    layout: { padding: 20 },
                    plugins: {
                        legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } },
                        datalabels: {
                            color: '#fff',
                            font: { weight: 'bold', size: 12 },
                            formatter: (value, ctx) => {
                                if (value === 0) return null;
                                let percentage = (value * 100 / total).toFixed(1) + "%";
                                return `${value}\n(${percentage})`;
                            },
                            textAlign: 'center'
                        }
                    }
                }
            });

            // 类型统计图 (横向柱状图更适合长标题)
            if (typeChart) typeChart.destroy();
            const typeCtx = document.getElementById('typeChart').getContext('2d');
            typeChart = new Chart(typeCtx, {
                type: 'bar',
                data: {
                    labels: Object.keys(typeCounts),
                    datasets: [{
                        label: '任务数量',
                        data: Object.values(typeCounts),
                        backgroundColor: '#3b82f6',
                        borderRadius: 6,
                        barThickness: 20
                    }]
                },
                options: {
                    indexAxis: 'y', // 横向柱状图
                    maintainAspectRatio: false,
                    scales: {
                        x: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 10 } }, grid: { display: false } },
                        y: { ticks: { font: { size: 11, weight: '500' } } }
                    },
                    plugins: {
                        legend: { display: false },
                        datalabels: {
                            anchor: 'end',
                            align: 'right',
                            color: '#64748b',
                            font: { size: 10, weight: 'bold' }
                        }
                    }
                }
            });
        }

        function renderTable() {
            const body = document.getElementById('tableBody');
            const searchInput = document.getElementById('searchInput').value.toLowerCase();
            const dateFromInput = document.getElementById('dateFrom').value;
            const dateEndInput = document.getElementById('dateEnd').value;
            
            const dateFrom = dateFromInput ? new Date(dateFromInput) : new Date(0);
            const dateEnd = dateEndInput ? new Date(dateEndInput) : new Date();
            
            updateTotalCounters();

            const filtered = rawData.filter(item => {
                const itemDate = new Date(item.created);
                const matchDept = currentDept === 'All' || item.dept === currentDept;
                const matchStatus = currentStatus === 'all' || item.status === currentStatus;
                const matchSearch = item.id.toLowerCase().includes(searchInput) || item.user.toLowerCase().includes(searchInput) || item.scope.toLowerCase().includes(searchInput);
                const matchDate = itemDate >= dateFrom && itemDate <= dateEnd;
                return matchDept && matchStatus && matchSearch && matchDate;
            });

            updateCharts(filtered);

            let totalCost = 0;
            if (filtered.length === 0) {
                body.innerHTML = `<tr><td colspan="8" class="px-6 py-12 text-center text-slate-400 italic">在该筛选条件下未发现相关数据</td></tr>`;
                document.getElementById('totalCostDisplay').innerText = `¥ 0.00`;
                return;
            }

            body.innerHTML = filtered.map(item => {
                totalCost += item.cost;
                let pendingClass = (item.status !== 'closed' && item.status !== 'cancelled') ? (item.pending > 14 ? 'sla-critical' : (item.pending > 7 ? 'sla-warning' : '')) : '';
                const costDisplay = (item.status === 'open' || item.status === 'inprogress') ? '<span class="text-slate-400 italic text-[10px]">TBD</span>' : `¥${item.cost.toLocaleString()}`;

                return `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4">
                            <div class="font-bold text-slate-800">${item.id}</div>
                            <div class="text-[10px] text-slate-400 font-medium">${item.dept} / ${item.user} / <span class="text-slate-500">${item.created}</span></div>
                        </td>
                        <td class="px-6 py-4 text-slate-600 font-medium">${item.type}</td>
                        <td class="px-6 py-4 text-center"><span class="${pendingClass}">${item.pending} 天</span></td>
                        <td class="px-6 py-4">${getStatusBadge(item.status)}</td>
                        <td class="px-6 py-4 font-mono text-slate-700 font-semibold">${costDisplay}</td>
                        <td class="px-6 py-4 text-slate-600 text-xs">${item.approver}</td>
                        <td class="px-6 py-4 text-slate-500 max-w-[200px] truncate text-xs" title="${item.scope}">${item.scope}</td>
                        <td class="px-6 py-4 text-center">
                            <a href="#" class="text-blue-600 hover:text-blue-800 flex items-center justify-center gap-1 font-bold">
                                <i class="fa-solid fa-link text-[10px]"></i> ${item.link}
                            </a>
                        </td>
                    </tr>`;
            }).join('');

            document.getElementById('totalCostDisplay').innerText = `¥ ${totalCost.toLocaleString()}.00`;
        }

        function exportData() {
            const btn = event.currentTarget;
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> 正在生成...';
            setTimeout(() => {
                alert(`数据已导出！\n筛选条件：部门[${currentDept}]，状态[${currentStatus.toUpperCase()}]\n包含数据：${document.getElementById('totalCount').innerText} 条`);
                btn.innerHTML = originalHTML;
            }, 800);
        }

        document.getElementById('searchInput').addEventListener('input', renderTable);
        window.onload = init;
    </script>
</body>
</html>
