<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intake Summary Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --lulu-red: #E31937;
            --lulu-red-light: #FEF2F2;
        }
        
        body { 
            font-family: 'Inter', 'Microsoft YaHei', sans-serif; 
            background-color: #f8fafc; 
        }
        
        /* lululemon Red Accent Bar */
        .lulu-accent {
            border-left: 4px solid var(--lulu-red);
        }
        
        .lulu-text {
            color: var(--lulu-red);
        }
        
        .lulu-bg {
            background-color: var(--lulu-red);
        }
        
        .lulu-bg-light {
            background-color: var(--lulu-red-light);
        }
        
        /* SLA Status Styles */
        .sla-critical { 
            color: #DC2626; 
            font-weight: 700; 
            background: #FEE2E2; 
            padding: 4px 10px; 
            border-radius: 6px;
            font-size: 0.75rem;
        }
        
        .sla-warning { 
            color: #D97706; 
            font-weight: 700; 
            background: #FEF3C7; 
            padding: 4px 10px; 
            border-radius: 6px;
            font-size: 0.75rem;
        }
        
        .sla-normal {
            color: #059669;
            font-weight: 600;
            background: #D1FAE5;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
        }
        
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { 
            width: 6px; 
            height: 6px; 
        }
        
        .custom-scrollbar::-webkit-scrollbar-track { 
            background: #f1f5f9; 
            border-radius: 3px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: #cbd5e1; 
            border-radius: 3px; 
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        
        /* Chart Container */
        .chart-container { 
            height: 280px; 
            position: relative; 
        }
        
        /* Collapsible Section */
        #chartSection { 
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out; 
            overflow: hidden; 
        }
        
        #chartSection.collapsed { 
            max-height: 0; 
            opacity: 0;
            padding-top: 0;
            padding-bottom: 0;
        }
        
        #chartSection.expanded { 
            max-height: 700px; 
            opacity: 1;
        }
        
        /* KPI Cards */
        .kpi-card { 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }
        
        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: transparent;
            transition: background 0.25s ease;
        }
        
        .kpi-card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.08), 0 8px 10px -6px rgb(0 0 0 / 0.05); 
        }
        
        .kpi-card.active { 
            border-color: var(--lulu-red);
            background-color: #FEF2F2;
        }
        
        .kpi-card.active::before {
            background: var(--lulu-red);
        }
        
        /* Department Buttons */
        .dept-btn {
            transition: all 0.2s ease;
            position: relative;
        }
        
        .dept-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: var(--lulu-red);
            transition: all 0.2s ease;
            transform: translateX(-50%);
        }
        
        .dept-btn:hover::after {
            width: 60%;
        }
        
        .dept-btn.active {
            background-color: var(--lulu-red);
            color: white;
        }
        
        .dept-btn.active::after {
            display: none;
        }
        
        /* Table Styles */
        .data-table th {
            font-weight: 600;
            letter-spacing: 0.025em;
            text-transform: uppercase;
            font-size: 0.65rem;
        }
        
        .data-table tbody tr {
            transition: background-color 0.15s ease;
        }
        
        .data-table tbody tr:hover {
            background-color: #F8FAFC;
        }
        
        /* Status Badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.025em;
        }
        
        .status-open {
            background: #DBEAFE;
            color: #1D4ED8;
        }
        
        .status-inprogress {
            background: #FEF3C7;
            color: #B45309;
        }
        
        .status-closed {
            background: #D1FAE5;
            color: #047857;
        }
        
        .status-cancelled {
            background: #F1F5F9;
            color: #475569;
        }
        
        /* Toggle Icon Animation */
        #toggleIcon {
            transition: transform 0.3s ease;
        }
        
        #toggleIcon.rotated {
            transform: rotate(180deg);
        }
        
        /* Search Input Focus */
        .search-input:focus {
            box-shadow: 0 0 0 3px rgba(227, 25, 55, 0.1);
            border-color: var(--lulu-red);
        }
        
        /* Export Button */
        .export-btn {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            transition: all 0.2s ease;
        }
        
        .export-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
        }
        
        /* Date Input */
        input[type="date"] {
            font-family: inherit;
        }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-8">

    <div class="max-w-[1400px] mx-auto space-y-5" id="app">

                    </div>

                    <tbody id="tableBody" class="divide-y divide-slate-100 text-sm"></tbody>
                    <tfoot>

                            </td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="text-center text-xs text-slate-400 py-4">
            Intake Summary Report · 数据更新时间: <span id="updateTime"></span>
        </div>
    </div>

            { id: "INT-26020", dept: "Corporate", user: "孙八", type: "开发任务", created: "2026-03-06", pending: 0, status: "open", cost: 0, approver: "Manager F", scope: "法务合规在线审核插件", link: "BRD-920" },
            
            // 历史数据 (用于显示总费用累积)
            { id: "INT-25101", dept: "EC", user: "张三", type: "项目任务", created: "2025-12-10", pending: 85, status: "closed", cost: 240000, approver: "VP X", scope: "年度官网重构工程", link: "BRD-801" },
            { id: "INT-25102", dept: "Marketing", user: "李四", type: "开发任务", created: "2026-01-05", pending: 60, status: "closed", cost: 32000, approver: "Manager B", scope: "年货节自动化营销工具", link: "BRD-802" },
            { id: "INT-25103", dept: "Tech", user: "王五", type: "配置任务", created: "2026-01-15", pending: 50, status: "cancelled", cost: 0, approver: "Director C", scope: "已废弃的测试机环境配置", link: "BRD-803" },
            { id: "INT-25104", dept: "Retail", user: "赵六", type: "项目任务", created: "2026-01-20", pending: 45, status: "closed", cost: 18000, approver: "Manager D", scope: "POS 系统离线模式开发", link: "BRD-804" },
            { id: "INT-25105", dept: "SCM", user: "陈七", type: "额外资金申请任务", created: "2026-02-01", pending: 33, status: "closed", cost: 5500, approver: "Manager E", scope: "仓库消防器材年检", link: "BRD-805" },
            { id: "INT-25106", dept: "Corporate", user: "孙八", type: "配置任务", created: "2026-02-05", pending: 29, status: "closed", cost: 3000, approver: "Manager F", scope: "财务报销单审批流调整", link: "BRD-806" },
            { id: "INT-25107", dept: "MP&A", user: "周九", type: "项目任务", created: "2026-02-10", pending: 24, status: "closed", cost: 12000, approver: "Manager G", scope: "数据分析大屏 3.0", link: "BRD-807" },
            { id: "INT-25108", dept: "EC", user: "张三", type: "开发任务", created: "2026-02-12", pending: 22, status: "closed", cost: 9500, approver: "Manager A", scope: "搜索推荐算法微调", link: "BRD-808" },
            { id: "INT-25109", dept: "Marketing", user: "李四", type: "配置任务", created: "2026-02-15", pending: 19, status: "closed", cost: 4800, approver: "Manager B", scope: "情人节落地页配置", link: "BRD-809" },
            { id: "INT-25110", dept: "Tech", user: "王五", type: "项目任务", created: "2026-02-20", pending: 14, status: "closed", cost: 55000, approver: "Director C", scope: "私有云服务器迁移", link: "BRD-810" }
        ];

        let currentDept = 'All';
        let currentStatus = 'all'; 
        let statusChart = null;
        let typeChart = null;

        function init() {
            // Set default date range (last 2 weeks)
            const today = new Date();
            const twoWeeksAgo = new Date(today);
            twoWeeksAgo.setDate(today.getDate() - 14);
            
            document.getElementById('dateFrom').valueAsDate = twoWeeksAgo;
            document.getElementById('dateEnd').valueAsDate = today;
            
            // Set update time
            document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');
            
            updateTotalCounters();
            renderTable();
        }

        function toggleCharts() {
            const section = document.getElementById('chartSection');
            const icon = document.getElementById('toggleIcon');
            if (section.classList.contains('expanded')) {
                section.classList.replace('expanded', 'collapsed');
                icon.classList.add('rotated');
            } else {
                section.classList.replace('collapsed', 'expanded');
                icon.classList.remove('rotated');
            }
        }

        function resetDateFilter() {
            const today = new Date();
            const twoWeeksAgo = new Date(today);
            twoWeeksAgo.setDate(today.getDate() - 14);
            
            document.getElementById('dateFrom').valueAsDate = twoWeeksAgo;
            document.getElementById('dateEnd').valueAsDate = today;
            renderTable();
        }

        function updateTotalCounters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const dateFromInput = document.getElementById('dateFrom').value;
            const dateEndInput = document.getElementById('dateEnd').value;
            
            const dateFrom = dateFromInput ? new Date(dateFromInput) : new Date(0);
            const dateEnd = dateEndInput ? new Date(dateEndInput) : new Date();

            const filteredBySearchAndDate = rawData.filter(item => {
                const itemDate = new Date(item.created);
                const matchDept = currentDept === 'All' || item.dept === currentDept;
                const matchSearch = item.id.toLowerCase().includes(search) || item.user.toLowerCase().includes(search) || item.scope.toLowerCase().includes(search);
                const matchDate = itemDate >= dateFrom && itemDate <= dateEnd;
                return matchDept && matchSearch && matchDate;
            });

            document.getElementById('totalCount').innerText = filteredBySearchAndDate.length;
            document.getElementById('openCount').innerText = filteredBySearchAndDate.filter(i => i.status === 'open').length;
            document.getElementById('progressCount').innerText = filteredBySearchAndDate.filter(i => i.status === 'inprogress').length;
            document.getElementById('closedCount').innerText = filteredBySearchAndDate.filter(i => i.status === 'closed').length;
            document.getElementById('cancelledCount').innerText = filteredBySearchAndDate.filter(i => i.status === 'cancelled').length;
        }

        function filterDept(dept) {
            currentDept = dept;
            document.querySelectorAll('.dept-btn').forEach(btn => {
                if (btn.dataset.dept === dept) {
                    btn.classList.add('active');
                    btn.classList.remove('text-slate-600', 'hover:bg-slate-50');
                } else {
                    btn.classList.remove('active');
                    btn.classList.add('text-slate-600', 'hover:bg-slate-50');
                }
            });
            updateTotalCounters();
            renderTable();
        }

        function filterStatus(status) {
            currentStatus = status.toLowerCase();
            document.querySelectorAll('.kpi-card').forEach(card => card.classList.remove('active'));
            const activeCard = document.getElementById(`kpi-${currentStatus}`);
            if (activeCard) activeCard.classList.add('active');
            renderTable();
        }

        function getStatusBadge(status) {
            const map = {
                open: '<span class="status-badge status-open"><i class="fa-regular fa-circle text-[8px]"></i> OPEN</span>',
                inprogress: '<span class="status-badge status-inprogress"><i class="fa-solid fa-spinner text-[8px]"></i> IN PROGRESS</span>',
                closed: '<span class="status-badge status-closed"><i class="fa-solid fa-check text-[8px]"></i> CLOSED</span>',
                cancelled: '<span class="status-badge status-cancelled"><i class="fa-solid fa-ban text-[8px]"></i> CANCELLED</span>'
            };
            return map[status] || status;
        }

        function getPendingClass(pending, status) {
            if (status === 'closed' || status === 'cancelled') return '';
            if (pending > 14) return 'sla-critical';
            if (pending > 7) return 'sla-warning';
            return 'sla-normal';
        }

        function updateCharts(filteredData) {
            const statusCounts = { open: 0, inprogress: 0, closed: 0, cancelled: 0 };
            const typeCounts = {};
            let total = filteredData.length;

            filteredData.forEach(item => {
                statusCounts[item.status]++;
                typeCounts[item.type] = (typeCounts[item.type] || 0) + 1;
            });

            // Status Chart (Pie)
            if (statusChart) statusChart.destroy();
            const statusCtx = document.getElementById('statusChart').getContext('2d');
            statusChart = new Chart(statusCtx, {
                type: 'doughnut',
                data: {
                    labels: ['未开始', '进行中', '已关闭', '已取消'],
                    datasets: [{
                        data: [statusCounts.open, statusCounts.inprogress, statusCounts.closed, statusCounts.cancelled],
                        backgroundColor: ['#60a5fa', '#fbbf24', '#34d399', '#94a3b8'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    layout: { padding: 20 },
                    cutout: '60%',
                    plugins: {
                        legend: { 
                            position: 'bottom', 
                            labels: { 
                                boxWidth: 12, 
                                font: { size: 11 },
                                padding: 15
                            } 
                        },
                        datalabels: {
                            color: '#fff',
                            font: { weight: 'bold', size: 11 },
                            formatter: (value, ctx) => {
                                if (value === 0) return null;
                                let percentage = (value * 100 / total).toFixed(0) + '%';
                                return percentage;
                            },
                            textAlign: 'center'
                        }
                    }
                }
            });

            // Type Chart (Horizontal Bar)
            if (typeChart) typeChart.destroy();
            const typeCtx = document.getElementById('typeChart').getContext('2d');
            typeChart = new Chart(typeCtx, {
                type: 'bar',
                data: {
                    labels: Object.keys(typeCounts),
                    datasets: [{
                        label: '任务数量',
                        data: Object.values(typeCounts),
                        backgroundColor: '#E31937',
                        borderRadius: 6,
                        barThickness: 22
                    }]
                },
                options: {
                    indexAxis: 'y',
                    maintainAspectRatio: false,
                    scales: {
                        x: { 
                            beginAtZero: true, 
                            ticks: { stepSize: 1, font: { size: 10 } }, 
                            grid: { display: false } 
                        },
                        y: { 
                            ticks: { font: { size: 11, weight: '500' } },
                            grid: { display: false }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        datalabels: {
                            anchor: 'end',
                            align: 'right',
                            color: '#64748b',
                            font: { size: 11, weight: 'bold' },
                            formatter: (value) => value > 0 ? value : ''
                        }
                    }
                }
            });
        }

        function renderTable() {
            const body = document.getElementById('tableBody');
            const searchInput = document.getElementById('searchInput').value.toLowerCase();
            const dateFromInput = document.getElementById('dateFrom').value;
            const dateEndInput = document.getElementById('dateEnd').value;
            
            const dateFrom = dateFromInput ? new Date(dateFromInput) : new Date(0);
            const dateEnd = dateEndInput ? new Date(dateEndInput) : new Date();
            
            updateTotalCounters();

            const filtered = rawData.filter(item => {
                const itemDate = new Date(item.created);
                const matchDept = currentDept === 'All' || item.dept === currentDept;
                const matchStatus = currentStatus === 'all' || item.status === currentStatus;
                const matchSearch = item.id.toLowerCase().includes(searchInput) || item.user.toLowerCase().includes(searchInput) || item.scope.toLowerCase().includes(searchInput);
                const matchDate = itemDate >= dateFrom && itemDate <= dateEnd;
                return matchDept && matchStatus && matchSearch && matchDate;
            });

            updateCharts(filtered);

            let totalCost = 0;
            if (filtered.length === 0) {
                body.innerHTML = `<tr><td colspan="8" class="px-6 py-12 text-center text-slate-400"><i class="fa-solid fa-inbox text-3xl mb-3 block"></i>在该筛选条件下未发现相关数据</td></tr>`;
                document.getElementById('totalCostDisplay').innerText = `¥ 0`;
                return;
            }

            body.innerHTML = filtered.map(item => {
                totalCost += item.cost;
                const pendingClass = getPendingClass(item.pending, item.status);
                const costDisplay = (item.status === 'open' || item.status === 'inprogress') 
                    ? '<span class="text-slate-400 italic text-xs">待定</span>' 
                    : `<span class="font-mono font-semibold text-slate-700">¥${item.cost.toLocaleString()}</span>`;

                return `
                    <tr class="group">
                        <td class="px-5 py-4">
                            <div class="font-bold text-slate-800 text-sm">${item.id}</div>
                            <div class="text-xs text-slate-400 mt-0.5">${item.dept} · ${item.user} · ${item.created}</div>
                        </td>
                        <td class="px-5 py-4">
                            <span class="text-slate-600 text-sm">${item.type}</span>
                        </td>
                        <td class="px-5 py-4 text-center">
                            ${pendingClass ? `<span class="${pendingClass}">${item.pending} 天</span>` : `<span class="text-slate-400 text-sm">-</span>`}
                        </td>
                        <td class="px-5 py-4">${getStatusBadge(item.status)}</td>
                        <td class="px-5 py-4">${costDisplay}</td>
                        <td class="px-5 py-4 text-slate-600 text-xs">${item.approver}</td>
                        <td class="px-5 py-4">
                            <div class="text-slate-600 text-xs max-w-[200px] truncate" title="${item.scope}">${item.scope}</div>
                        </td>
                        <td class="px-5 py-4 text-center">
                            <a href="#" class="inline-flex items-center gap-1 text-xs font-semibold text-blue-600 hover:text-blue-800 transition-colors bg-blue-50 hover:bg-blue-100 px-2 py-1 rounded">
                                <i class="fa-solid fa-link text-[10px]"></i> ${item.link}
                            </a>
                        </td>
                    </tr>`;
            }).join('');

            document.getElementById('totalCostDisplay').innerText = `¥ ${totalCost.toLocaleString()}`;
        }

        function exportData() {
            const btn = event.currentTarget;
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> <span class="hidden sm:inline">生成中...</span>';
            btn.disabled = true;
            
            setTimeout(() => {
                alert(`数据导出成功！\n\n筛选条件：\n- 部门: ${currentDept}\n- 状态: ${currentStatus.toUpperCase()}\n- 数据条数: ${document.getElementById('totalCount').innerText}\n\n文件已保存到下载文件夹`);
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }, 800);
        }

        document.getElementById('searchInput').addEventListener('input', renderTable);
        window.onload = init;
    </script>
</body>
</html>
