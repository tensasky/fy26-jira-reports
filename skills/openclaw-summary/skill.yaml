name: conversation-summary
version: 1.0.0
description: 会话小结 - 输入对话内容，返回会话摘要
author: openclaw
tags:
  - summary
  - conversation
  - assistant

tools:
  - name: summarize_conversation
    description: 对对话内容进行小结，生成会话摘要
    parameters:
      type: object
      properties:
        chatList:
          type: string
          description: 对话内容列表，JSON格式的对话记录
        historySummary:
          type: string
          description: 历史会话摘要（可选），用于增量更新摘要
      required:
        - chatList
